name: Heska
kind: company
description: Heska is a veterinary diagnostics company that makes in-clinic point-of-care
  lab analyzers and imaging for veterinary practices - chemistry (Element DC/DCX/RC/RCX),
  hematology (Element HT5), blood gas and electrolytes (Element POC), immunodiagnostics
  (Element i), coagulation (Element COAG), and AI-guided urine/fecal/blood-morphology
  testing (Element AIM) - plus the HeskaView Connect lab data and workflow software.
  Heska was acquired by Antech Diagnostics, a subsidiary of Mars, Incorporated (Mars
  Petcare / Mars Science & Diagnostics), in 2023, and now operates as an Antech company.
  Heska exposes a partner-gated integration API that bidirectionally connects its
  analyzers to veterinary practice information management systems (PIMS/EMR) - orders
  flow out to the analyzers and results flow back into the patient record - but there
  is no public, self-service developer portal, published API reference, OpenAPI, or
  public pricing. Access is provisioned to approved integration partners (ezyVet,
  Instinct, Vetspire, NectarVet, Digitail, and others) via API Partner credentials.
