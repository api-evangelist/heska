  - Records
  - PIMS
  - Partner API
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://careville.instinct.vet/instinct-emr/instinct-emr-user-manuals/integrations/heska-point-of-care-diagnostics/
  properties:
  - url: https://careville.instinct.vet/instinct-emr/instinct-emr-user-manuals/integrations/heska-point-of-care-diagnostics/
    type: Documentation
  description: Partner-gated integration surface for associating a lab order and its
    results with a patient/owner record so diagnostic charts are created and updated
    automatically in the integrating EMR. No public API reference, base URL, or
    OpenAPI is published; this is modeled from documented partner integration
    behavior and is not verified against a public specification.
