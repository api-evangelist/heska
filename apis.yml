apis:
- aid: heska:heska-lab-orders-api
  name: Heska Lab Orders API
  tags:
  - Orders
  - Point of Care
  - Analyzers
  - Partner API
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ezyvet.com/en/see-all-integrations/diagnostic-tests/heska
  properties:
  - url: https://docs.ezyvet.com/en/see-all-integrations/diagnostic-tests/heska
    type: Documentation
  description: Partner-gated integration surface for placing point-of-care laboratory
    orders from a practice information management system to Heska in-clinic analyzers.
    A completed order in the PIMS triggers a request to the analyzer to run the
    selected panel. No public API reference, base URL, or OpenAPI is published;
    endpoints are modeled from documented partner integration behavior (ezyVet,
    Instinct) and are not verified against a public specification.
- aid: heska:heska-analyzer-results-api
  name: Heska Analyzer Results API
  tags:
  - Results
  - Analyzers
  - Diagnostics
  - Partner API
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.heska.com/product/heskaview-connect/
  properties:
  - url: https://www.heska.com/product/heskaview-connect/
    type: Documentation
  description: Partner-gated integration surface for returning completed analyzer
    results back into the ordering PIMS patient record. HeskaView Connect provides
    consolidated reports, unlimited analyzer connections, rapid retrieval, and
    bidirectional communication so results upload automatically into patient files.
    No public API reference, base URL, or OpenAPI is published; endpoints are
    modeled from documented partner integration behavior and are not verified
    against a public specification.
- aid: heska:heska-patients-api
  name: Heska Patients API
  tags:
