aid: heska
name: Heska
review:
  question: Does Heska expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Heska does not publish a public API of
    any protocol - there is no public developer portal, API reference, or
    OpenAPI - so there is no documented server-push transport (WebSocket or
    SSE) to model. Heska's integration surface is a partner-gated,
    request/response style order-and-result exchange between its in-clinic
    analyzers and veterinary practice information management systems (PIMS/EMR),
    provisioned privately to approved integration partners.
findings:
  summary: |
    Heska does not publish a documented public WebSocket API. Heska is a
    veterinary diagnostics company (in-clinic point-of-care analyzers and
    imaging) that was acquired by Antech Diagnostics, a subsidiary of Mars,
    Incorporated, in 2023, and now operates as an Antech company. Heska does
    expose an integration API, but it is partner-gated: there is no public,
    self-service developer portal, no published API reference, no OpenAPI, and
    no public base URL or pricing. Access is granted to approved practice
    management / EMR partners (ezyVet, Instinct, Vetspire, NectarVet, Digitail,
    and others) through "API Partner" credentials. The integration is a
    bidirectional order-and-result exchange - a PIMS places a point-of-care lab
    order, the analyzer runs the panel, and results flow back into the patient
    record (surfaced to clinics via HeskaView Connect). No realtime,
    bidirectional, or streaming WebSocket (ws:// or wss://) endpoint is
    documented anywhere in Heska's public materials as of the review date.
  publicApi: false
  accessModel: |
    Partner-gated. Heska provisions integration credentials ("API Partner"
    client credentials) to approved PIMS/EMR vendors rather than offering
    open developer signup. The only public documentation of the integration
    lives in the partner PIMS knowledge bases (e.g. ezyVet, Instinct), not on
    a Heska developer portal.
  ownership: |
    Heska was acquired by Antech Diagnostics in 2023 (transaction closed
    mid-2023). Antech is part of Mars, Incorporated (Mars Petcare / Mars
    Science & Diagnostics). Heska now operates as "Heska, an Antech company,"
    with product pages appearing under both heska.com and antechdiagnostics.com.
  transports:
    - protocol: Partner Integration (HTTP)
      scheme: https
      documented: false
      note: Order-and-result exchange between Heska analyzers and PIMS/EMR
        systems, provisioned to approved partners. No public base URL or
        reference is published; behavior is documented only in partner PIMS
        knowledge bases.
    - protocol: REST
      scheme: https
      documented: false
      note: No public REST API reference or base URL is published by Heska.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Heska's public
        materials as of the review date.
  endpointsModeled: true
  endpointsModeledNote: |
    The three APIs listed in apis.yml (Lab Orders, Analyzer Results, Patients)
    are logical groupings modeled from documented partner integration behavior,
    not from a published Heska specification. No concrete public endpoints,
    base URLs, or request/response schemas are asserted, because none are
    published.
