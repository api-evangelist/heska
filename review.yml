actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists, and Heska publishes no public API of
    any protocol. This entry is an honest stub: it records the company, its
    Mars/Antech ownership, and its partner-gated integration model, with the
    order/result/patient APIs modeled from documented partner behavior rather
    than fabricated. No AsyncAPI document was created because there is no public
    server-push transport - or any public API surface - on Heska's side to model.
